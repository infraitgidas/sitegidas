services:
  # ==========================================
  # SERVICIO: Base de Datos MariaDB
  # ==========================================
  db:
    image: gidas-docker-db:latest
    container_name: gidas_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - gidas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # SERVICIO: PHP-FPM con Drupal
  # ==========================================
  php:
    image: gidas-docker-php:latest
    container_name: gidas_php
    restart: unless-stopped
    environment:
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_MAX_EXECUTION_TIME: ${PHP_MAX_EXECUTION_TIME:-300}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-64M}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-64M}
      DRUPAL_ENVIRONMENT: ${ENVIRONMENT:-development}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./gidas:/var/www/html:cached
      - files_data:/var/www/html/sites/default/files
      - private_data:/var/www/private
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
      - ./docker/php/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    networks:
      - gidas_network
    depends_on:
      db:
        condition: service_healthy
    working_dir: /var/www/html

  # ==========================================
  # SERVICIO: Nginx Reverse Proxy
  # ==========================================
  nginx:
    image: gidas-docker-nginx:latest
    container_name: gidas_nginx
    restart: unless-stopped
#    ports:
#      - "${NGINX_PORT:-80}:80"
#      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./gidas:/var/www/html:ro
      - files_data:/var/www/html/sites/default/files:ro
      - ./docker/nginx/drupal.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs_data:/etc/nginx/certs
    networks:
      - gidas_network
    depends_on:
      - php
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # SERVICIO: phpMyAdmin (solo desarrollo)
  # ==========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5
    container_name: gidas_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
    ports:
      - "${PMA_PORT:-8080}:80"
    networks:
      - gidas_network
    depends_on:
      - db
    profiles:
      - dev

  # ==========================================
  # SERVICIO: Redis Cache (Opcional pero recomendado)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: gidas_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - gidas_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    profiles:
      - cache

  # ==========================================
  # SERVICIO: Backup Automatizado
  # ==========================================
  backup:
    image: offen/docker-volume-backup:v2
    container_name: gidas_backup
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "7"
      BACKUP_FILENAME: gidas-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      BACKUP_ARCHIVE: "/archive"
      BACKUP_STOP_CONTAINER_LABEL: gidas.stop-during-backup
      NOTIFICATION_URLS: ${BACKUP_NOTIFICATION_URL:-}
    volumes:
      - db_data:/backup/db:ro
      - files_data:/backup/files:ro
      - ./backups:/archive
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - gidas_network
    profiles:
      - backup

volumes:
  db_data:
    driver: local
  files_data:
    driver: local
  private_data:
    driver: local
  certs_data:
    driver: local
  redis_data:
    driver: local

networks:
  gidas_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
