services:
  nginx:
    expose:
      - "80"
    volumes:
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - NGINX_ENVSUBST_OUTPUT_DIR=/etc/nginx/conf.d
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gidas_web.rule=Host(`192.168.1.106`)"
      - "traefik.http.routers.gidas_web.entrypoints=web"
      - "traefik.http.services.gidas_web.loadbalancer.server.port=80"
      - "traefik.docker.network=gidas-docker_gidas_network"
  php:
    environment:
      PHP_MEMORY_LIMIT: 512M
      PHP_MAX_EXECUTION_TIME: 300
      DRUPAL_ENVIRONMENT: production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_PASSWORD: ""
    secrets:
      - db_root_password
      - db_password
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    command: >
      mysqld
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=200
      --query-cache-type=1
      --query-cache-size=64M

  # Agregar Traefik para SSL automático y balanceo
  traefik:
    image: traefik:v2.11
    container_name: gidas_traefik
    environment:
      - DOCKER_API_VERSION=1.44
    restart: unless-stopped
    command:
      - "--log.level=DEBUG"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@gidas.frlp.utn.edu.ar"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--ping=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    networks:
      - gidas_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.gidas.frlp.utn.edu.ar`)"
      - "traefik.http.routers.traefik.service=api@internal"
#      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
#      - "traefik.http.routers.traefik.middlewares=auth@file"

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_password:
    file: ./secrets/db_password.txt
