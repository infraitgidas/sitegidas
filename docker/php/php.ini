; Configuración PHP para Drupal
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 3000
post_max_size = 64M
upload_max_filesize = 64M
max_file_uploads = 20

; Error handling
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Date
date.timezone = America/Argentina/Buenos_Aires

; Session
session.gc_maxlifetime = 200000
session.cookie_lifetime = 2000000

; NO cargar extensiones aquí (ya están en Dockerfile)
; extension = pdo_mysql, mysqli, etc. ← ELIMINAR

; APCu configuración (no la extensión)
apc.enabled = 1
apc.shm_size = 64M
apc.enable_cli = 1

; Security
expose_php = Off
allow_url_fopen = On
allow_url_include = Off