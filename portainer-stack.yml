services:
  portainer:
    image: portainer/portainer-ce:2.39.0-alpine
    container_name: portainer
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    environment:
      - TZ=America/Argentina/Buenos_Aires
    networks:
      - portainer_network

  # Agente de Portainer para gestión remota (opcional)
  agent:
    image: portainer/agent:2.39.0-alpine
    container_name: portainer_agent
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    ports:
      - "9001:9001"
    networks:
      - portainer_network

volumes:
  portainer_data:

networks:
  portainer_network:
    driver: bridge